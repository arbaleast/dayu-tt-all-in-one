# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 耗材管理与预警 — Klipper 显示宏
# 文件路径: firmware/consumable_manager/filament_display.cfg
# 对应子任务: 9bcbda5a-cc0a-44ce-b6ed-c6f87cc2ad85
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 【功能】
# 1. 在 Klipper 屏幕显示当前耗材剩余百分比
# 2. M117 命令驱动屏幕显示耗材信息
# 3. 通过 REST API 查询耗材状态
#
# 【变量说明】
# filament_remaining_pct  — 剩余百分比（0-100）
# filament_remaining_g    — 剩余克数
# filament_material       — 当前材料
# filament_is_low        — 是否低库存（1=低, 0=正常）
#
# 【使用】
# 在 printer.cfg 添加: [include firmware/consumable_manager/filament_display.cfg]

[gcode_variables]
# 耗材剩余量显示变量（由 consumable_monitor.py 通过 Moonraker API 写入）
filament_remaining_pct = 100.0
filament_remaining_g = 1000.0
filament_material = "PLA"
filament_is_low = 0
filament_last_update = ""


# ━━━ 查询耗材状态 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[gcode_macro QUERY_FILAMENT]
description: 查询当前耗材剩余状态并在屏幕显示
gcode:
    {% set pct = printer["gcode_variables"].filament_remaining_pct %}
    {% set g = printer["gcode_variables"].filament_remaining_g %}
    {% set mat = printer["gcode_variables"].filament_material %}
    {% set is_low = printer["gcode_variables"].filament_is_low %}

    # 屏幕显示
    {% if is_low == 1 %}
        M117 ⚠️耗材不足 { pct }% | { g }g
    {% else %}
        M117 [{mat}] { pct }% | { g }g
    {% endif %}

    # 输出到控制台
    {action_respond_info("耗材: %s | 剩余: %.1f%% (%sg) | 低库存: %s" % (mat, pct, g, "是 ⚠️" if is_low else "否"))}


# ━━━ 耗材换料流程 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[gcode_macro FILAMENT_CHANGE]
description: 换料流程（换料后重置耗材计数器）
gcode:
    # 1. 暂停打印
    PAUSE
    # 2. 抬起喷嘴
    TMC_MOVE Z=10
    # 3. 屏幕提示
    M117 请更换耗材，然后执行 FILAMENT_LOADED
    # 4. 记录换料时间
    SET_GCODE_VARIABLE VARIABLE=filament_last_update VALUE='"{raw_time}"'


[gcode_macro FILAMENT_LOADED]
description: 确认耗材加载完成，重置计数器
gcode:
    # 重置为 100%
    SET_GCODE_VARIABLE VARIABLE=filament_remaining_pct VALUE=100.0
    {% set net_g = params.NET_WEIGHT|default(1000)|float %}
    SET_GCODE_VARIABLE VARIABLE=filament_remaining_g VALUE={net_g}
    SET_GCODE_VARIABLE VARIABLE=filament_is_low VALUE=0

    M117 ✅耗材已重置: {net_g}g
    {action_respond_info("耗材计数器已重置为 %.1fg" % net_g)}


# ━━━ 打印完成后自动减重 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[gcode_macro FILAMENT_USED]
description: 记录本次打印消耗的耗材重量（单位：g）
gcode:
    {% set used_g = params.GRAMMS|default(0)|float %}
    {% set current_g = printer["gcode_variables"].filament_remaining_g %}
    {% set net_g = printer["gcode_variables"].filament_remaining_g %}

    {% set new_g = current_g - used_g %}
    {% if new_g < 0 %}
        {% set new_g = 0.0 %}
    {% endif %}

    {% set pct = (new_g / net_g * 100.0) if net_g > 0 else 0.0 %}

    SET_GCODE_VARIABLE VARIABLE=filament_remaining_g VALUE={new_g}
    SET_GCODE_VARIABLE VARIABLE=filament_remaining_pct VALUE={pct}

    # 检查是否低库存
    {% if pct < 20.0 %}
        SET_GCODE_VARIABLE VARIABLE=filament_is_low VALUE=1
        M117 ⚠️ 耗材低库存: { pct }%
        {action_respond_info("⚠️ 低库存预警: 剩余 %.1f%% (%sg)" % (pct, new_g))}
    {% else %}
        SET_GCODE_VARIABLE VARIABLE=filament_is_low VALUE=0
    {% endif %}

    {action_respond_info("耗材已更新: %.1fg (消耗 %.1fg)" % (new_g, used_g))}


# ━━━ 手动设置耗材信息 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[gcode_macro SET_FILAMENT]
description: 手动设置当前耗材信息
gcode:
    # 参数: MATERIAL=<材料> NET_WEIGHT=<净重g> COLOR_HEX=<色值>
    {% set mat = params.MATERIAL|default("PLA") %}
    {% set net_g = params.NET_WEIGHT|default(1000)|float %}
    {% set color = params.COLOR_HEX|default("#000000") %}

    SET_GCODE_VARIABLE VARIABLE=filament_material VALUE='"{mat}"'
    SET_GCODE_VARIABLE VARIABLE=filament_remaining_g VALUE={net_g}
    SET_GCODE_VARIABLE VARIABLE=filament_remaining_pct VALUE=100.0
    SET_GCODE_VARIABLE VARIABLE=filament_is_low VALUE=0

    M117 [{mat}] {net_g}g 已装填
    {action_respond_info("耗材已设置: %s (%.0fg, %s)" % (mat, net_g, color))}


# ━━━ 初始化显示 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
[delayed_gcode filament_init_display]
initial_duration: 3
gcode:
    QUERY_FILAMENT
    {action_respond_info("🐟 大鱼 TT 耗材管理与预警系统已就绪（阈值: 20%%）")}
